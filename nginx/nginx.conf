server {
    listen 80;

    # Serve the static files built by React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For React Router to work properly:
        try_files $uri $uri/ /index.html;
    }

    # Proxy requests to the backend (since package.json proxy won't work in Nginx)
    location /api/ {
        # Using the container name from your docker-compose: phalanx
        proxy_pass http://phalanx:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
